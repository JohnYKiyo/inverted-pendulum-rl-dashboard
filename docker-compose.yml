services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # Mount application code to sync changes (except node_modules and .next)
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      # For watch mode file change detection in some file systems
      # - WATCHPACK_POLLING=true
    command: npm run dev
